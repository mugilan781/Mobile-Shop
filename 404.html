<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Page not found — MR Mobile Hub. The page you're looking for doesn't exist." />
  <title>404 — Page Not Found | MR Mobile Hub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/responsive.css" />
  <style>
    .particles-404 {
      position: fixed;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
      z-index: 0;
    }

    .floating-vector {
      position: absolute;
      width: 44px;
      height: 44px;
      opacity: 0.08;
      animation: floatY 5s ease-in-out infinite;
      color: var(--clr-cyan);
      stroke-width: 1.5px;
    }

    .error-code {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.4rem 1rem;
      background: rgba(239,68,68,0.08);
      border: 1px solid rgba(239,68,68,0.2);
      border-radius: 999px;
      font-size: 0.78rem;
      font-weight: 700;
      color: var(--clr-error);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 1.5rem;
    }

    .nav-404-links {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      justify-content: center;
      margin-top: 2rem;
    }

    .nav-404-link {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.5rem 1.25rem;
      background: var(--clr-bg-card);
      border: 1px solid var(--clr-border);
      border-radius: var(--r-full);
      font-size: 0.8rem;
      color: var(--clr-silver);
      transition: all 0.3s ease;
      text-decoration: none;
      font-weight: 500;
    }

    .nav-404-link:hover {
      border-color: var(--clr-cyan);
      color: var(--clr-white);
      background: rgba(6,182,212,0.08);
      transform: translateY(-2px);
    }
  </style>
</head>
<body>

<!-- Particles & Background Vectors -->
<div class="particles-404" aria-hidden="true">
  <!-- Wrench -->
  <svg class="floating-vector" style="top:12%;left:8%;animation-delay:-1s;" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"></path></svg>
  <!-- Phone -->
  <svg class="floating-vector" style="top:25%;right:10%;animation-delay:-2s;" viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="5" y="2" width="14" height="20" rx="2" ry="2"></rect><line x1="12" y1="18" x2="12.01" y2="18"></line></svg>
  <!-- Shield -->
  <svg class="floating-vector" style="bottom:22%;left:12%;animation-delay:-3s;" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>
  <!-- Earbuds -->
  <svg class="floating-vector" style="bottom:28%;right:8%;animation-delay:-0.5s;" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M3 18v-6a9 9 0 0 1 18 0v6"></path><path d="M21 19a2 2 0 0 1-2 2h-1a2 2 0 0 1-2-2v-3a2 2 0 0 1 2-2h3zM3 19a2 2 0 0 0 2 2h1a2 2 0 0 0 2-2v-3a2 2 0 0 0-2-2H3z"></path></svg>

  <!-- Glow blobs -->
  <div style="position:absolute;width:500px;height:500px;border-radius:50%;background:radial-gradient(circle,rgba(37,99,235,0.06) 0%,transparent 70%);top:-100px;left:-100px;pointer-events:none;"></div>
  <div style="position:absolute;width:400px;height:400px;border-radius:50%;background:radial-gradient(circle,rgba(6,182,212,0.05) 0%,transparent 70%);bottom:-50px;right:-50px;pointer-events:none;"></div>
</div>

<main class="special-page bg-grid" role="main">
  <div class="special-content">
    <!-- Error tag -->
    <div class="error-code">
      ● Error 404 — Page Not Found
    </div>

    <!-- Glitch 404 -->
    <div style="position:relative;display:inline-block;" aria-label="404">
      <div class="glitch-number">404</div>
    </div>

    <h1 style="font-size:clamp(1.5rem,4vw,2.5rem);font-weight:800;margin:1.5rem 0 1rem;font-family:var(--font-display);">
      Oops! <span class="grad-text">Page Offline</span>
    </h1>

    <p style="color:var(--clr-silver);font-size:0.95rem;line-height:1.7;max-width:480px;margin:0 auto 2.5rem;">
      The URL structure has been altered, or this page doesn't exist. Let's return to the main dashboard.
    </p>

    <!-- Main CTAs -->
    <div style="display:flex;gap:1rem;justify-content:center;flex-wrap:wrap;">
      <a href="index.html" class="btn btn-primary">🏠 Return Home</a>
      <a href="contact.html" class="btn btn-outline">🔧 Contact Support</a>
    </div>

    <!-- Quick navigation -->
    <div class="nav-404-links">
      <a href="home2.html"    class="nav-404-link">Explore Collection</a>
      <a href="about.html"    class="nav-404-link">About Us</a>
      <a href="services.html" class="nav-404-link">Repair Services</a>
      <a href="gallery.html"  class="nav-404-link">Product Gallery</a>
    </div>
  </div>
</main>

<script src="js/main.js"></script>
</body>
</html>
