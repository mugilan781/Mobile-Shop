<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Login to NexCell — Access your account to track repairs, view orders, and manage your profile." />
  <title>Login — NexCell</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/responsive.css" />
  <style>
    .auth-bg-particles {
      position: fixed;
      inset: 0;
      z-index: 0;
      overflow: hidden;
      pointer-events: none;
    }
    .auth-bg-particles::before {
      content: '';
      position: absolute;
      width: 500px;
      height: 500px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(37,99,235,0.08) 0%, transparent 70%);
      top: -150px;
      left: -150px;
      animation: floatY 6s ease-in-out infinite;
    }
    .auth-bg-particles::after {
      content: '';
      position: absolute;
      width: 400px;
      height: 400px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(6,182,212,0.06) 0%, transparent 70%);
      bottom: -100px;
      right: -100px;
      animation: floatY 8s ease-in-out infinite reverse;
    }

    .input-icon-wrap {
      position: relative;
    }
    .input-icon-wrap .form-input {
      padding-left: 2.75rem;
    }
    .input-icon {
      position: absolute;
      left: 1rem;
      top: 50%;
      transform: translateY(-50%);
      color: var(--clr-silver-dim);
      font-size: 1rem;
      pointer-events: none;
      display: flex;
      align-items: center;
    }
    .input-icon svg { width: 16px; height: 16px; fill: none; stroke: currentColor; stroke-width: 2px; }

    .pw-toggle {
      position: absolute;
      right: 1rem;
      top: 50%;
      transform: translateY(-50%);
      color: var(--clr-silver-dim);
      cursor: pointer;
      font-size: 0.85rem;
      background: none;
      border: none;
      transition: color 0.2s;
    }
    .pw-toggle:hover { color: var(--clr-white); }

    .social-login-btn {
      width: 100%;
      padding: 0.75rem;
      background: rgba(255,255,255,0.03);
      border: 1.5px solid var(--clr-border);
      border-radius: var(--r-md);
      color: var(--clr-white);
      font-size: 0.82rem;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
      transition: all 0.3s ease;
      font-family: var(--font-body);
    }
    .social-login-btn:hover {
      background: rgba(37,99,235,0.05);
      border-color: var(--clr-border-glow);
      transform: translateY(-1px);
    }
    .social-login-btn svg { width: 16px; height: 16px; fill: currentColor; }

    .trust-badges {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 1.25rem;
      margin-top: 1.5rem;
      flex-wrap: wrap;
    }
    .trust-badge {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.7rem;
      color: var(--clr-silver-dim);
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .trust-badge svg { width: 12px; height: 12px; fill: none; stroke: var(--clr-cyan); stroke-width: 2px; }
  </style>
</head>
<body>

<div class="auth-bg-particles" aria-hidden="true"></div>

<!-- Grid background -->
<div class="grid-lines" aria-hidden="true" style="position:fixed;inset:0;background-image:linear-gradient(rgba(37,99,235,0.02) 1px, transparent 1px),linear-gradient(90deg, rgba(37,99,235,0.02) 1px, transparent 1px);background-size:60px 60px;pointer-events:none;z-index:0;"></div>

<main class="auth-page" role="main">
  <div class="auth-card">

    <!-- Logo -->
    <div class="auth-logo" style="text-align:center;">
      <div class="logo-icon" style="margin:0 auto 1rem;width:48px;height:48px;font-size:1.25rem;">
        <svg viewBox="0 0 24 24" width="22" height="22" stroke="currentColor" stroke-width="2.5" fill="none"><rect x="5" y="2" width="14" height="20" rx="2" ry="2"></rect><line x1="12" y1="18" x2="12.01" y2="18"></line></svg>
      </div>
      <h1 class="auth-title">Welcome Back</h1>
      <p class="auth-subtitle">Sign in to your NexCell account</p>
    </div>

    <!-- Social Logins -->
    <div style="display:flex;flex-direction:column;gap:0.75rem;margin-top:1.5rem;">
      <button class="social-login-btn" type="button" aria-label="Continue with Google">
        <svg viewBox="0 0 24 24"><path d="M12.24 10.285V14.4h6.887c-.648 2.41-2.519 4.114-5.111 4.114a5.83 5.83 0 0 1-5.823-5.83 5.83 5.83 0 0 1 5.823-5.83c1.55 0 2.94.57 4.02 1.5l3.19-3.19a10.23 10.23 0 0 0-7.21-2.9c-5.69 0-10.3 4.61-10.3 10.3s4.61 10.3 10.3 10.3c6 0 9.94-4.22 9.94-10.12 0-.61-.06-1.19-.17-1.72H12.24z"/></svg>
        Continue with Google
      </button>
      <button class="social-login-btn" type="button" aria-label="Continue with Facebook">
        <svg viewBox="0 0 24 24"><path d="M22 12c0-5.52-4.48-10-10-10S2 6.48 2 12c0 4.84 3.44 8.87 8 9.8V15H8v-3h2V9.5C10 7.57 11.57 6 13.5 6H16v3h-2c-.55 0-1 .45-1 1v2h3v3h-3v6.8c4.56-.93 8-4.96 8-9.8z"/></svg>
        Continue with Facebook
      </button>
    </div>

    <div class="auth-divider">
      <span>or sign in with email</span>
    </div>

    <!-- Login Form -->
    <form class="auth-form" data-validate-form id="loginForm" novalidate>
      <div class="form-group">
        <label class="form-label" for="loginEmail">Email Address</label>
        <div class="input-icon-wrap">
          <span class="input-icon">
            <svg viewBox="0 0 24 24"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg>
          </span>
          <input type="email" id="loginEmail" class="form-input" placeholder="your@email.com" data-validate="required|email" autocomplete="email" />
        </div>
        <span class="form-error" style="display:none;"></span>
      </div>

      <div class="form-group">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:0.25rem;">
          <label class="form-label" for="loginPassword" style="margin:0;">Password</label>
          <a href="#" style="font-size:0.75rem;color:var(--clr-cyan);font-weight:600;text-decoration:none;">Forgot password?</a>
        </div>
        <div class="input-icon-wrap" style="position:relative;">
          <span class="input-icon">
            <svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
          </span>
          <input type="password" id="loginPassword" class="form-input" placeholder="Enter your password" data-validate="required|minlen:6" autocomplete="current-password" />
          <button type="button" class="pw-toggle" id="pwToggle" aria-label="Toggle password visibility">Show</button>
        </div>
        <span class="form-error" style="display:none;"></span>
      </div>

      <div class="form-checkbox">
        <input type="checkbox" id="rememberMe" />
        <label class="form-checkbox-label" for="rememberMe">Remember me for 30 days</label>
      </div>

      <button type="submit" class="btn-submit" style="margin-top:0.5rem;">Sign In</button>
    </form>

    <!-- Redirect -->
    <div class="auth-redirect">
      Don't have an account? <a href="signup.html">Create one free</a>
    </div>

    <!-- Trust badges -->
    <div class="trust-badges">
      <div class="trust-badge">
        <svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
        SSL Secured
      </div>
      <div class="trust-badge">
        <svg viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>
        Privacy Shield
      </div>
    </div>
  </div>
</main>

<script src="js/main.js"></script>
<script src="js/form.js"></script>
<script>
  // Password toggle
  document.getElementById('pwToggle')?.addEventListener('click', () => {
    const pw = document.getElementById('loginPassword');
    const btn = document.getElementById('pwToggle');
    if (pw.type === 'password') {
      pw.type = 'text';
      btn.textContent = 'Hide';
    } else {
      pw.type = 'password';
      btn.textContent = 'Show';
    }
  });
</script>
</body>
</html>
