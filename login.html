<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Login to NexCell — Access your account to track repairs, view orders, and manage your profile." />
  <title>Login — NexCell</title>
  <!-- Theme: FOUC prevention (immediate before paint) -->
  <script>
    (function(){var t='dark';try{var s=localStorage.getItem('nexcell-theme');if(s==='light'||s==='dark')t=s;}catch(e){}if(t==='light')document.documentElement.setAttribute('data-theme','light');try{var d=localStorage.getItem('nexcell-dir');if(d==='rtl')document.documentElement.setAttribute('dir','rtl');}catch(e){}})();
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/theme.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/responsive.css" />
  <link rel="stylesheet" href="css/rtl.css" />
  <style>
    .auth-bg-particles {
      position: fixed;
      inset: 0;
      z-index: 0;
      overflow: hidden;
      pointer-events: none;
    }
    .auth-bg-particles::before {
      content: '';
      position: absolute;
      width: 500px;
      height: 500px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(239,68,68,0.06) 0%, transparent 70%);
      top: -150px;
      left: -150px;
      animation: floatY 6s ease-in-out infinite;
    }
    .auth-bg-particles::after {
      content: '';
      position: absolute;
      width: 400px;
      height: 400px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(37,99,235,0.05) 0%, transparent 70%);
      bottom: -100px;
      right: -100px;
      animation: floatY 8s ease-in-out infinite reverse;
    }

    .auth-card {
      width: 100%;
      max-width: 440px;
      background: var(--clr-auth-card);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid var(--clr-auth-card-border);
      border-radius: 24px;
      padding: 3rem 2.5rem 2.5rem;
      position: relative;
      z-index: 2;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.55);
    }

    .auth-title {
      font-family: var(--font-display);
      font-size: 1.85rem;
      font-weight: 700;
      color: var(--clr-white);
      margin-bottom: 0.35rem;
    }

    .auth-subtitle {
      font-size: 0.92rem;
      color: var(--clr-silver-dim);
      margin-bottom: 2rem;
    }

    .social-login-btn {
      width: 100%;
      height: 50px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 14px;
      color: var(--clr-white);
      font-size: 0.9rem;
      font-weight: 500;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      font-family: var(--font-body);
    }
    .social-login-btn:hover {
      background: rgba(255, 255, 255, 0.08);
      border-color: rgba(255, 255, 255, 0.15);
      transform: translateY(-2px);
      box-shadow: 0 6px 15px rgba(0, 0, 0, 0.3);
    }
    .social-login-btn:active {
      transform: translateY(0);
    }
    .social-btn-icon {
      position: absolute;
      left: 1.25rem;
      display: flex;
      align-items: center;
    }

    .auth-divider {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin: 1.85rem 0;
    }
    .auth-divider::before, .auth-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: rgba(255, 255, 255, 0.08);
    }
    .auth-divider span {
      font-size: 0.72rem;
      color: var(--clr-silver-dim);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      white-space: nowrap;
    }

    .form-group {
      margin-bottom: 1.25rem;
    }
    .form-label {
      display: block;
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--clr-white);
      margin-bottom: 0.5rem;
      text-align: left;
    }

    .input-icon-wrap {
      position: relative;
    }
    .input-icon-wrap .form-input {
      padding-left: 2.75rem;
      padding-right: 3rem;
      border-radius: 14px;
      height: 50px;
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(255, 255, 255, 0.08);
      color: var(--clr-white);
      width: 100%;
      font-family: var(--font-body);
      font-size: 0.95rem;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .input-icon-wrap .form-input::placeholder {
      color: var(--clr-silver-dim);
      opacity: 0.55;
    }
    .input-icon-wrap .form-input:focus {
      border-color: var(--clr-red-light) !important;
      background: rgba(255, 255, 255, 0.04) !important;
      outline: none;
      box-shadow: 0 0 12px rgba(255, 75, 75, 0.15);
    }

    .input-icon {
      position: absolute;
      left: 1rem;
      top: 50%;
      transform: translateY(-50%);
      color: var(--clr-silver-dim);
      pointer-events: none;
      display: flex;
      align-items: center;
    }
    .input-icon svg {
      width: 18px;
      height: 18px;
      fill: none;
      stroke: currentColor;
      stroke-width: 2px;
    }

    .pw-toggle {
      position: absolute;
      right: 1rem;
      top: 50%;
      transform: translateY(-50%);
      color: var(--clr-silver-dim);
      cursor: pointer;
      background: none;
      border: none;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color var(--tr-base);
    }
    .pw-toggle:hover {
      color: var(--clr-white);
    }

    .btn-submit {
      width: 100%;
      height: 52px;
      border-radius: 14px;
      background: var(--clr-red-light);
      color: var(--clr-white);
      border: none;
      font-weight: 600;
      font-size: 0.95rem;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 4px 12px rgba(255, 75, 75, 0.2);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .btn-submit:hover {
      transform: translateY(-2px);
      background: #ff5c5c;
      box-shadow: 0 6px 20px rgba(255, 75, 75, 0.35);
    }
    .btn-submit:active {
      transform: translateY(0);
    }

    .form-error {
      display: flex;
      align-items: center;
      color: #ef4444;
      font-size: 0.78rem;
      margin-top: 0.45rem;
      text-align: left;
    }

    .auth-redirect {
      text-align: center;
      margin-top: 2rem;
      font-size: 0.9rem;
      color: var(--clr-silver);
    }
    .auth-redirect a {
      color: var(--clr-red-light);
      font-weight: 600;
      text-decoration: none;
      transition: color var(--tr-base);
    }
    .auth-redirect a:hover {
      color: var(--clr-red);
    }

    .trust-badges {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 1.5rem;
      margin-top: 2rem;
      flex-wrap: wrap;
    }
    .trust-badge {
      display: flex;
      align-items: center;
      gap: 0.45rem;
      font-size: 0.72rem;
      color: var(--clr-silver-dim);
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .trust-badge svg {
      width: 14px;
      height: 14px;
      fill: none;
      stroke: var(--clr-red-light);
      stroke-width: 2px;
    }
  </style>
</head>
<body>

<div class="auth-bg-particles" aria-hidden="true"></div>

<!-- Grid background -->
<div class="grid-lines" aria-hidden="true" style="position:fixed;inset:0;background-image:linear-gradient(rgba(255,75,75,0.01) 1px, transparent 1px),linear-gradient(90deg, rgba(255,75,75,0.01) 1px, transparent 1px);background-size:60px 60px;pointer-events:none;z-index:0;"></div>

<main class="auth-page" role="main">
  <div class="auth-card">

    <!-- Branding Header -->
    <div class="auth-branding" style="text-align: center; margin-bottom: 1.75rem; display: flex; flex-direction: column; align-items: center;">
      <a href="index.html" style="text-decoration: none; display: inline-flex; flex-direction: column; align-items: center; gap: 0.65rem;">
        <img src="images/logo.png" alt="NexCell Logo" style="height: 65px; width: auto; object-fit: contain; filter: drop-shadow(0 2px 8px rgba(255,75,75,0.25));" />
        <span class="logo-text" style="color: #FFFFFF; font-weight: 700; font-family: var(--font-display); font-size: 1.6rem; letter-spacing: -0.02em;">Nex<span style="color: #FF4B4B;">Cell</span></span>
      </a>
    </div>

    <!-- Title / Welcome -->
    <div class="auth-logo" style="text-align:center;">
      <h1 class="auth-title">Welcome Back</h1>
      <p class="auth-subtitle">Sign in to your NexCell account</p>
    </div>

    <!-- Social Logins -->
    <div style="display:flex;flex-direction:column;gap:0.75rem;margin-top:0.5rem;">
      <button class="social-login-btn" type="button" aria-label="Continue with Google">
        <span class="social-btn-icon">
          <svg viewBox="0 0 24 24" width="18" height="18" style="flex-shrink:0;">
            <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
            <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
            <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.06H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.94l2.85-2.22.81-.63z"/>
            <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.06l3.66 2.84c.87-2.6 3.3-4.53 12-4.53z"/>
          </svg>
        </span>
        <span style="margin: 0 auto;">Continue with Google</span>
      </button>
      <button class="social-login-btn" type="button" aria-label="Continue with Apple">
        <span class="social-btn-icon">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor" style="flex-shrink:0;">
            <path d="M17.05 20.28c-.98.95-2.05.88-3.08.4-1.09-.5-2.08-.48-3.24 0-1.44.62-2.2.44-3.06-.4C3.79 16.2 3.13 8.65 8.1 8.52c1.37.04 2.22.7 2.92.7.72 0 1.95-.87 3.73-.67 1.8.2 3.12 1 3.86 2.18-3.62 2.13-3.05 6.94.34 8.24-.76 1.83-1.44 2.83-2.18 3.51M13.68 5.75c.98-1.19.85-3.2-.23-4.5-1.4.15-2.92 1.22-3.4 2.7.99 1.17 1.05 3.36 2.22 4.41c.64-.62 1.11-1.43 1.41-2.61"/>
          </svg>
        </span>
        <span style="margin: 0 auto;">Continue with Apple</span>
      </button>
    </div>

    <div class="auth-divider">
      <span>or continue with email</span>
    </div>

    <!-- Login Form -->
    <form class="auth-form" data-validate-form id="loginForm" novalidate style="margin-top:0;">
      <div class="form-group">
        <label class="form-label" for="loginEmail">Email Address</label>
        <div class="input-icon-wrap">
          <span class="input-icon">
            <svg viewBox="0 0 24 24"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg>
          </span>
          <input type="email" id="loginEmail" class="form-input" placeholder="your@email.com" data-validate="required|email" autocomplete="email" />
        </div>
        <span class="form-error" style="display:none;"></span>
      </div>

      <div class="form-group">
        <label class="form-label" for="loginPassword">Password</label>
        <div class="input-icon-wrap">
          <span class="input-icon">
            <svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
          </span>
          <input type="password" id="loginPassword" class="form-input" placeholder="Enter your password" data-validate="required|minlen:6" autocomplete="current-password" />
          <button type="button" class="pw-toggle" id="pwToggle" aria-label="Toggle password visibility">
            <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
              <circle cx="12" cy="12" r="3"></circle>
            </svg>
          </button>
        </div>
        <span class="form-error" style="display:none;"></span>
      </div>

      <!-- Remember Me & Forgot Password wrapper -->
      <div style="display:flex; align-items:center; justify-content:space-between; margin-top:0.75rem; margin-bottom: 1.25rem;">
        <div class="form-checkbox" style="margin: 0; display: flex; align-items: center; gap: 0.5rem;">
          <input type="checkbox" id="rememberMe" style="accent-color: var(--clr-red-light); width: 15px; height: 15px;" />
          <label class="form-checkbox-label" for="rememberMe" style="font-size:0.85rem; color:var(--clr-silver); cursor:pointer;">Remember me</label>
        </div>
        <a href="#" style="font-size:0.85rem; color:var(--clr-red-light); font-weight:600; text-decoration:none; transition:color var(--tr-base);" onmouseover="this.style.color='var(--clr-red)';" onmouseout="this.style.color='var(--clr-red-light)';">Forgot Password?</a>
      </div>

      <button type="submit" class="btn-submit">Sign In</button>
    </form>

    <!-- Redirect -->
    <div class="auth-redirect">
      Don't have an account? <a href="signup.html">Create Account</a>
    </div>

    <!-- Trust badges -->
    <div class="trust-badges">
      <div class="trust-badge">
        <svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
        SSL Secured
      </div>
      <div class="trust-badge">
        <svg viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>
        Privacy Shield
      </div>
    </div>
  </div>
</main>

<script src="js/main.js"></script>
<script src="js/form.js"></script>
<script src="js/theme.js"></script>
<script src="js/rtl.js"></script>
<script>
  // Password toggle
  document.getElementById('pwToggle')?.addEventListener('click', () => {
    const pw = document.getElementById('loginPassword');
    const btn = document.getElementById('pwToggle');
    if (pw.type === 'password') {
      pw.type = 'text';
      btn.innerHTML = `
        <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
          <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
          <line x1="1" y1="1" x2="23" y2="23"></line>
        </svg>
      `;
    } else {
      pw.type = 'password';
      btn.innerHTML = `
        <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
          <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
          <circle cx="12" cy="12" r="3"></circle>
        </svg>
      `;
    }
  });
</script>
</body>
</html>
